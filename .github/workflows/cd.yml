name: Continuous Deployment
on:
  workflow_dispatch:  

  push:
    branches:
          - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v1
        with:
          username: ${{secrets.DOCKER_HUB_USERNAME}}
          password: ${{secrets.DOCKER_HUB_ACCESS_TOKEN}}

      - name: Build Docker Image
        run: 
          docker build . -t  ${{secrets.DOCKER_HUB_USERNAME}}/medical-charges:latest
                
      - name: Push Image to Dockerhub
        run: |
          docker push ${{secrets.DOCKER_HUB_USERNAME}}/medical-charges:latest

      - name: Deploy to Google VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GOOGLE_VM_IP }}
          username: ${{ secrets.GOOGLE_VM_USERNAME }}
          key: ${{ secrets.GOOGLE_VM_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/medical-charges:latest

            docker stop medical-charges-container || true
            docker rm medical-charges-container || true

            docker run -d \
              --name medical-charges-container \
              -p 5000:5000 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/medical-charges:latest